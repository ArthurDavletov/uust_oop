name: Сборка и релиз

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            archive_name: uust_oop_windows_x64.zip
          - os: ubuntu-latest
            platform: linux-x64
            archive_name: uust_oop_linux_x64.tar.gz
          - os: macos-15-intel
            platform: macos-x64
            archive_name: uust_oop_macos_x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Кеш PyInstaller
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pyinstaller
            ~/Library/Application Support/pyinstaller
            ~/AppData/Local/pyinstaller
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('requirements.txt', 'uust_oop_gui.spec') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.1"

      - name: Установка Qt/XCB библиотек на Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-keysyms1 \
            libxcb-image0 \
            libxcb-icccm4 \
            libxcb-render-util0 \
            libxcb-xkb1 \
            libxcb-shape0 \
            libxcb-util1

      - name: Сборка программ на C++
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Сборка PySide6 приложений
        shell: bash
        run: |
          pyinstaller --noconfirm --workpath build/pyinstaller --distpath dist uust_oop_gui.spec

      - name: Подготовка файлов для архивации
        shell: bash
        run: |
          mkdir -p package
          cp -r dist/uust_oop_gui/. package/

          if [ "$RUNNER_OS" = "Windows" ]; then
            cp build/Release/lab2.exe package/
            cp build/Release/lab5.exe package/
          else
            cp build/lab2 package/
            cp build/lab5 package/
          fi

      - name: Создание архива на Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path package/* -DestinationPath ${{ matrix.archive_name }}

      - name: Создание архива на Linux/macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd package
          tar -czf ../${{ matrix.archive_name }} *

      - name: Отправка артефактов
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.archive_name }}

  release:
    name: Создание релиза
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Загрузка артефактов
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Создание контрольных сумм
        run: |
          cd release-assets
          sha256sum * > checksums.txt

      - name: Создание релиза и загрузка файлов
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --title "${GITHUB_REF_NAME}" \
            --notes "Автоматическая сборка для Windows, Linux и macOS."
